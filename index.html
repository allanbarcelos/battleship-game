<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Naval</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="container">
        <div id="header" class="header">
            <a id="buy-me-a-coffee" href="https://www.buymeacoffee.com/allanbarcelos" target="_blank">
                <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee"
                    style="height: 30px !important;width: 123px !important;margin-bottom: 5px;">
            </a>
            <button type="button" id="startGame">Start Game</button>
            <input type="text" id="gameCode" maxlength="10" minlength="10">
            <button type="button" id="info" class="openModal" data-modal="info">
                <i class="fa fa-question-circle" aria-hidden="true"></i>
            </button>
            <div id="fleet-me" style="display:none"><span></span></div>
            <div id="board-label">
                <span>Your Squad</span>
                <span id="turn-timer"></span>
            </div>
            <div id="conn-indicator"></div>
            <div id="fleet-enemy" style="display:none"><span></span></div>
        </div>
    </div>
    <div class="container center">
        <div class="grid" id="squad-grid"></div>
        <div class="grid board-hidden" id="ocean-grid"></div>
        <div id="chat-panel" style="display:none">
            <div id="chat-messages"></div>
            <div id="chat-input-row">
                <input type="text" id="chat-input" placeholder="Message..." maxlength="200" autocomplete="off">
                <button id="chat-send">Send</button>
            </div>
        </div>
    </div>


    <!--  -->
    <!-- Info Modal -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <button class="close" aria-label="Close">&times;</button>

            <h2>How to Start a Game</h2>

            <p>
                To begin, click <strong>"Start Game"</strong>. This will generate your game code.
                Share this code with your friend so they can join your game.
            </p>

            <h3>If You Received a Code</h3>
            <p>
                Enter the code into the input field next to <strong>"Start Game"</strong> and then
                click <strong>"Start Game"</strong> to join your friend's game.
            </p>
        </div>
    </div>


    <script src="assets/js/script.js"></script>
</body>

</html>
